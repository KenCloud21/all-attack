[build]
  publish = "."
  command = ""

[[headers]]
  for = "/images/*"

  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"

  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"

  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/data/*"

  [headers.values]
    Cache-Control = "public, max-age=300"
