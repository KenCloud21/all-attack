<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>球队阵容 · All ATTACK</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#091530;--navy2:#0d1f45;
  --red:#c41e3a;--red2:#e8304f;
  --gold:#d4a843;
  --white:#ffffff;--gray:#94a3b8;--gray2:#64748b;
  --border:rgba(255,255,255,0.08);--radius:14px;
}
body{
  font-family:'Oswald','Microsoft YaHei','PingFang SC',sans-serif;
  background:var(--navy);color:var(--white);
  line-height:1.6;overflow-x:hidden;
}
/* 导航 */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(9,21,48,0.94);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-inner{
  max-width:1280px;margin:0 auto;padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;height:72px;
}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-shield{width:48px;height:48px;border-radius:10px;display:block;object-fit:contain}
.logo-text{font-size:20px;font-weight:800;color:var(--white);letter-spacing:1px}
.logo-text span{color:var(--red2)}
nav{display:flex;gap:4px;overflow-x:auto}
nav a{
  background:none;border:none;color:var(--gray);
  padding:10px 20px;font-size:14px;cursor:pointer;
  border-radius:8px;transition:all 0.25s;
  text-decoration:none;font-weight:500;
  white-space:nowrap;flex:0 0 auto;
}
nav a:hover{color:var(--white);background:rgba(255,255,255,0.05)}
nav a.active{color:var(--white);background:rgba(196,30,58,0.15);font-weight:700}

/* 页面头 */
.page-hero{
  padding:60px 40px;text-align:center;
  background:radial-gradient(ellipse at 50% 30%,rgba(196,30,58,0.12) 0%,transparent 60%),linear-gradient(180deg,var(--navy),#0a1835);
  position:relative;
}
.page-hero::after{
  content:"";position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--red),var(--gold),transparent);
}
.page-hero h1{font-size:clamp(36px,6vw,56px);font-weight:900;letter-spacing:2px}
.page-hero h1 span{color:var(--red2)}
.page-hero p{color:var(--gray);font-size:16px;margin-top:12px}

/* 统计条 */
.stats-bar{
  max-width:1280px;margin:-30px auto 0;padding:0 40px;position:relative;z-index:10;
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
}
.stat-mini{
  background:linear-gradient(135deg,var(--navy2),#12254a);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 16px;text-align:center;
}
.stat-mini .num{font-size:30px;font-weight:900;color:var(--white);line-height:1}
.stat-mini .lbl{font-size:11px;color:var(--gray2);margin-top:4px;letter-spacing:1px}

/* 球员网格 */
.content{max-width:1280px;margin:0 auto;padding:48px 40px}
.section-title{
  font-size:24px;font-weight:800;display:flex;align-items:center;gap:14px;margin-bottom:28px;
}
.section-title::before{content:"";width:4px;height:28px;background:var(--red);border-radius:2px}

.roster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}

.player-card{
  background:linear-gradient(135deg,var(--navy2),#12254a);
  border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:all 0.35s;position:relative;
}
.player-card:hover{
  transform:translateY(-6px);border-color:rgba(196,30,58,0.3);
  box-shadow:0 16px 48px rgba(0,0,0,0.5);
}
.player-card::after{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--red),var(--gold));
  transform:scaleX(0);transition:transform 0.35s;
}
.player-card:hover::after{transform:scaleX(1)}

.player-img{
  height:240px;background:var(--navy);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.player-img img{width:100%;height:100%;object-fit:cover}
.player-img .num-overlay{
  position:absolute;top:12px;right:12px;
  font-size:42px;font-weight:900;color:rgba(255,255,255,0.15);
  line-height:1;
}
.player-body{padding:20px;text-align:center;position:relative}
.player-body h3{font-size:17px;color:var(--white);margin-bottom:4px}
.player-body .pos{
  display:inline-block;background:rgba(196,30,58,0.15);
  color:var(--red2);padding:3px 14px;border-radius:12px;
  font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:10px;
}
.player-body .stats-row{
  display:flex;justify-content:center;gap:24px;margin-top:12px;
}
.player-body .stat{text-align:center}
.player-body .stat .val{font-size:20px;font-weight:800;color:var(--gold)}
.player-body .stat .lbl{font-size:10px;color:var(--gray2);letter-spacing:1px}

/* 页脚 */
footer{
  border-top:1px solid var(--border);padding:48px 40px;text-align:center;
}
.footer-inner{max-width:1280px;margin:0 auto}
.footer-logo{font-size:28px;font-weight:900;margin-bottom:12px}
.footer-logo span{color:var(--red2)}
.footer-tagline{color:var(--gray2);font-size:14px;margin-bottom:24px}
.footer-links{display:flex;gap:32px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.footer-links a{color:var(--gray);text-decoration:none;font-size:13px;transition:color 0.2s}
.footer-links a:hover{color:var(--white)}
.footer-copy{color:var(--gray2);font-size:12px}

@media(max-width:768px){
  .nav-inner{padding:0 20px;gap:16px}
  .logo-text{font-size:16px}
  .logo-shield{width:40px;height:40px}
  nav a{padding:8px 14px;font-size:13px}
  .page-hero{padding:40px 20px}
  .content{padding:32px 20px}
  .stats-bar{grid-template-columns:repeat(2,1fr);padding:0 20px}
  .roster-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
  .player-img{height:180px}
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}
.animate{animation:fadeUp 0.6s ease forwards}
.delay-1{animation-delay:0.1s}.delay-2{animation-delay:0.2s}
.delay-3{animation-delay:0.3s}.delay-4{animation-delay:0.4s}
</style>
</head>
<body>

<header>
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <img class="logo-shield" src="images/logo.png" alt="All ATTACK">
      <div class="logo-text">ALL<span>ATTACK</span></div>
    </a>
    <nav>
      <a href="index.html">首页</a>
      <a href="roster.html" class="active">球队阵容</a>
      <a href="schedule.html">赛程比分</a>
      <a href="highlights.html">精彩集锦</a>
      <a href="formation.html">阵容图</a>
    </nav>
  </div>
</header>

<section class="page-hero">
  <h1 class="animate">球队<span>阵容</span></h1>
  <p class="animate delay-1">15位队员 · 以进攻之名，集结于此</p>
</section>

<div class="stats-bar">
  <div class="stat-mini animate delay-1"><div class="num">15</div><div class="lbl">队员总数</div></div>
  <div class="stat-mini animate delay-2"><div class="num">11</div><div class="lbl">首发席位</div></div>
  <div class="stat-mini animate delay-3"><div class="num">4</div><div class="lbl">轮换队员</div></div>
  <div class="stat-mini animate delay-4"><div class="num">0</div><div class="lbl">固定位置</div></div>
</div>

<div class="content">
  <div class="section-title animate">全部队员</div>
  <div class="roster-grid"></div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-logo">ALL<span>ATTACK</span></div>
    <p class="footer-tagline">进攻即信仰，冲锋即荣耀</p>
    <div class="footer-links">
      <a href="index.html">首页</a>
      <a href="roster.html">球队阵容</a>
      <a href="schedule.html">赛程比分</a>
      <a href="highlights.html">精彩集锦</a>
      <a href="formation.html">阵容图</a>
    </div>
    <p class="footer-copy">&copy; 2026 All ATTACK Professional Football Club. All rights reserved.</p>
  </div>
</footer>

<script>
const players=[
  {name:"3RA-",img:"images/avatars/3RA-.png"},
  {name:"82_Lafee",img:"images/avatars/82_Lafee.png"},
  {name:"Addits",img:"images/avatars/Addits.png"},
  {name:"Ander_pilro202X",img:"images/avatars/Ander_pilro202X.png"},
  {name:"Encourage_Frog",img:"images/avatars/Encourage_Frog.png"},
  {name:"hidavid",img:"images/avatars/hidavid.png"},
  {name:"JayMarsXx",img:"images/avatars/JayMarsXx.png"},
  {name:"Johnnywang315",img:"images/avatars/Johnnywang315.png"},
  {name:"Marcoleslie82",img:"images/avatars/Marcoleslie82.png"},
  {name:"MiJi003",img:"images/avatars/MiJi003.png"},
  {name:"PiggyHer0",img:"images/avatars/PiggyHer0.png"},
  {name:"Tomas9824",img:"images/avatars/Tomas9824.png"},
  {name:"UncleJeffChu",img:"images/avatars/UncleJeffChu.png"},
  {name:"Weapon_Zhou",img:"images/avatars/Weapon_Zhou.png"},
  {name:"Xiamuchen97",img:"images/avatars/Xiamuchen97.png"},
  {name:"xman",img:"images/avatars/xman.png"}
];
const rosterGrid=document.querySelector(".roster-grid");
rosterGrid.innerHTML=players.map((player,index)=>`
  <div class="player-card animate delay-${index%4+1}">
    <div class="player-img">
      <img src="${player.img}" alt="${player.name}">
      <div class="num-overlay">${String(index+1).padStart(2,"0")}</div>

    <div class="player-body">
      <h3>${player.name}</h3>
      <div class="stats-row">
        <div class="stat"><div class="val">-</div><div class="lbl">出场</div></div>
        <div class="stat"><div class="val">-</div><div class="lbl">进球</div></div>
        <div class="stat"><div class="val">-</div><div class="lbl">助攻</div></div>
      </div>
    </div>
  </div>
`).join("");
</script>
</body>
</html>
